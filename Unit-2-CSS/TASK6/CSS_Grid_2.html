<!DOCTYPE html>
<html>
<head>
<title>CSS Grid Part 2</title>

<style>

.container{

display:grid;

grid-template-columns:repeat(auto-fit,200px);

gap:10px;

}

.box{

background:lightgreen;

padding:20px;

border:2px solid black;

}

/* Grid Areas */

.layout{

display:grid;

grid-template-areas:

"header header"

"menu content"

"footer footer";

gap:10px;

margin-top:20px;

}

.header{grid-area:header; background:orange;}
.menu{grid-area:menu; background:pink;}
.content{grid-area:content; background:lightblue;}
.footer{grid-area:footer; background:gray;}

</style>

</head>

<body>

<h2>Auto-fit</h2>

<div class="container">

<div class="box">1</div>
<div class="box">2</div>
<div class="box">3</div>
<div class="box">4</div>

</div>

<h2>Grid Areas</h2>

<div class="layout">

<div class="header">Header</div>

<div class="menu">Menu</div>

<div class="content">Content</div>

<div class="footer">Footer</div>

</div>

</body>
</html>
