<!DOCTYPE html>
<html>
<head>
<title>Selector Basics</title>

<style>

/* Element Selector */
p{
color:black;
font-size: 20px;
}

/* Class Selector */
.box{
background:lightcoral;
}

/* ID Selector */
#title{
color:brown;
}

/* Universal Selector */
*{
font-family:'Times New Roman', Times, serif;
}

/* Group Selector */
h2,p{
margin:10px;
}

</style>

</head>

<body>

<h1 id="title">CSS Selectors Basics</h1>

<h2>Academic Informations</h2>

<p>This is Varshalakshmi from Chennai.</p>

<p class="box">Studing BE in CSE</p>

</body>
</html>
