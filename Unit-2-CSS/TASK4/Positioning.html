<!DOCTYPE html>
<html>
<head>
<title>Positioning</title>
<style>

.box1{

position:relative;

left:50px;

top:20px;

background:rgb(50, 205, 78);

}

.box2{

position:absolute;

top:50px;

left:100px;

background:red;

}

.box3{

position:fixed;

bottom:0;

right:0;

background:green;

}

</style>

</head>

<body>

<div class="box1">Relative</div>

<div class="box2">Absolute</div>

<div class="box3">Fixed</div>

</body>
</html>
