<!DOCTYPE html>
<html>
<head>
<title>Units</title>

<style>

.box1{width:200px;background:rgb(233, 85, 85);}

.box2{width:50%;background:rgb(61, 61, 238);}

.box3{font-size:2em;}

.box4{font-size:2rem;}

.box5{

width:50vw;
height:50vh;

background:rgba(251, 251, 61, 0.967);

}

.box6{

width:calc(100% - 50px);

background:rgb(59, 247, 59);

}

</style>

</head>

<body>

<div class="box1">px - M Varshalakshmi</div>

<div class="box2">% - M Varshalakshmi</div>

<p class="box3">em - M Varshalakshmi</p>

<p class="box4">rem - M Varshalakshmi</p>

<div class="box5">vw vh - M Varshalakshmi</div>

<div class="box6">calc() - M Varshalakshmi</div>

</body>
</html>
