<!DOCTYPE html>
<html>
<head>
    <title>Embedding Maps and External Content</title>
</head>

<body>

<h2>Embedding Google Map</h2>

<iframe
src="https://www.google.com/maps?q=cyMJ2JWye8eUfC14A&output=embed"
width="600"
height="400"
style="border:0;"
allowfullscreen>
</iframe>

<hr>

<h2>Embedding Website Content</h2>

<iframe 
src="https://www.wikipedia.org"
width="500" 
height="300">
</iframe>

<hr>

<h2>Embedding YouTube Video</h2>

<iframe
width="600"
height="400"
src="https://www.youtube.com/embed/mnvQOtxp3aw"
frameborder="0"
allowfullscreen>
</iframe>

</body>
</html>
