<!DOCTYPE HTML>
<html>
 <head>
<title>Lists in HTML</title>
 </head>
  <body>
<!--List (bullatin points)-->
    <h2> Unordered List </h2>
    <ul>
      <li>Web Tech</li>
      <li>Oops</li>
      <li>Python</li>
    </ul>

    <h2> Ordered List </h2>
    <ol type ="a">
      <li>Web Tech</li>
      <li>Oops</li>
      <li>Python</li>
    </ol>

    <h2> Unordered List </h2>
    <ul type ="square">
      <li>Web Tech</li>
      <ol type ="1">
      <li>HTML</li>
      <li>CSS</li>
      <li>JS</li>
    </ol>
    <li>Oops</li>
    <li>Python</li>
    </ul>

    <h2>Discription List</h2>
    <dl>
      <dt> Web Tech </dt>
      <dd> This is web development </dd>
    </dl>
  </body>
</html>
